# ============================================================
# Large model — doubled expressivity (~5.7M params vs ~2.5M)
# ============================================================
# Same setup as default but with wider + deeper DiffusionNet.
# Purpose: test if more capacity improves representation quality.
#
# Usage:
#   uv run python -m examples.mesh_jepa.run_experiment \
#       --config examples/mesh_jepa/experiments/large.yaml all
# ============================================================

experiment:
  name: "large_model"
  seed: 42
  device: auto
  feature_types: [hks, xyz]

preprocessing:
  raw_data_dir: /lustre/work/vivatech-discretizers/shared/dfaust/raw
  processed_dir: /lustre/work/vivatech-discretizers/shared/dfaust/processed  # Use existing
  actions: [jumping_jacks, punching, running_on_spot]
  n_eigen: 128
  n_hks: 16
  temporal_stride: 4

training:
  seq_len: 16
  batch_size: 16
  num_workers: 0
  train_subjects: [50002, 50004, 50007, 50009, 50020, 50021, 50022, 50025]
  test_subjects: [50026, 50027]

  # Doubled DiffusionNet encoder (384 width, 8 blocks)
  width: 384                    # 256 → 384 (+50% channels)
  depth: 8                      # 6 → 8 (+33% blocks)
  henc: 256                     # Keep latent dim same (fair comparison)
  n_eigen: 128
  dropout: true

  # Predictor (same as default — fair comparison)
  hpre: 256
  predictor_layers: 2
  steps: 4
  grad_clip: 2.0

  # Loss (same as default)
  std_coeff: 10.0
  cov_coeff: 100.0
  proj_spec: "256-1024-1024"

  # Optimizer
  epochs: 60
  lr: 1.0e-3
  weight_decay: 1.0e-5

  log_wandb: false
  log_every: 1
  save_every: 100

eval:
  batch_size: 16
  num_workers: 0
  n_inference_clips: 3
  max_horizon: 15
