# ============================================================
# Sanity check — 10 epochs with pred_loss fix
# ============================================================
# Quick run to verify pred_loss decreases, then run full eval.
#
# Usage:
#   uv run python -m examples.mesh_jepa.run_experiment \
#       --config examples/mesh_jepa/experiments/sanity_10ep.yaml all
# ============================================================

experiment:
  name: "sanity_10ep"
  seed: 42
  device: auto
  feature_types: [hks, xyz]

preprocessing:
  raw_data_dir: datasets/dfaust/raw
  processed_dir: datasets/dfaust/processed
  actions: [jumping_jacks, punching, running_on_spot]
  n_eigen: 128
  n_hks: 16
  temporal_stride: 4

training:
  seq_len: 16
  batch_size: 16
  num_workers: 0
  train_subjects: [50002, 50004, 50007, 50009, 50020, 50021, 50022, 50025]
  test_subjects: [50026, 50027]

  width: 256
  depth: 6
  henc: 256
  n_eigen: 128
  dropout: true

  hpre: 256
  predictor_layers: 2
  steps: 4
  grad_clip: 2.0

  std_coeff: 10.0
  cov_coeff: 100.0
  proj_spec: "256-1024-1024"

  epochs: 10
  lr: 1.0e-3
  weight_decay: 1.0e-5

  log_wandb: false
  log_every: 1
  save_every: 5

eval:
  batch_size: 16
  num_workers: 0
  n_inference_clips: 2
  max_horizon: 15
