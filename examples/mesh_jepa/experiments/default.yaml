# ============================================================
# Mesh JEPA — Full Experiment Configuration
# ============================================================
# This file defines the entire pipeline: preprocessing, training, evaluation.
# One preprocessing run → two trainings (HKS + XYZ) → two evaluations.
#
# Usage:
#   uv run python -m examples.mesh_jepa.run_experiment --config examples/mesh_jepa/experiments/default.yaml all
#   uv run python -m examples.mesh_jepa.run_experiment --config examples/mesh_jepa/experiments/default.yaml preprocess
#   uv run python -m examples.mesh_jepa.run_experiment --config examples/mesh_jepa/experiments/default.yaml train
#   uv run python -m examples.mesh_jepa.run_experiment --config examples/mesh_jepa/experiments/default.yaml eval
# ============================================================

experiment:
  name: "baseline_3actions"   # CHANGE THIS for each new experiment (must be unique)
  seed: 42
  device: auto
  feature_types: [hks, xyz]   # Both trained from the same preprocessed data

# ---- Preprocessing ----
# Shared across both feature types (saves vertices + HKS)
preprocessing:
  raw_data_dir: /lustre/work/vivatech-discretizers/shared/dfaust/raw
  processed_dir: /lustre/work/vivatech-discretizers/shared/dfaust/processed  # Use existing preprocessed data
  #
  # Available actions (DFAUST, 14 total):
  #   chicken_wings, hips, jiggle_on_toes, jumping_jacks, knees,
  #   light_hopping_loose, light_hopping_stiff, one_leg_jump,
  #   one_leg_loose, punching, running_on_spot, shake_arms,
  #   shake_hips, shake_shoulders
  actions: [jumping_jacks, punching, running_on_spot]
  n_eigen: 128
  n_hks: 16
  temporal_stride: 4  # 60fps → 15fps

# ---- Training ----
# Runs once per feature_type in experiment.feature_types
# Hyperparams justified in logs/parameter_tuning.md
training:
  seq_len: 16
  batch_size: 128               # VICReg needs batch diversity for covariance estimation
  num_workers: 4
  train_subjects: [50002, 50004, 50007, 50009, 50020, 50021, 50022, 50025]
  test_subjects: [50026, 50027]

  # DiffusionNet encoder (from Sharp et al. 2022, scaled up for expressivity)
  width: 256                    # C_width: doubled from paper default for richer per-vertex features
  depth: 6                      # N_block: deeper for more diffusion iterations
  henc: 256                     # Output latent dim (representation space)
  n_eigen: 128                  # Laplacian eigenvectors: sufficient spectral resolution
  dropout: true                 # DiffusionNet paper: prevents overfitting on small datasets

  # GRU predictor (from EB-JEPA ac_video_jepa pattern)
  hpre: 256                     # Match encoder output dim
  predictor_layers: 2           # Deeper than 1 for better temporal modeling
  steps: 4                      # Multi-step rollout (EB-JEPA video_jepa default)
  grad_clip: 2.0                # Stabilizes RNN training (EB-JEPA ac_video_jepa)

  # Loss — VICReg temporal prediction regime (EB-JEPA video_jepa)
  std_coeff: 10.0               # Variance regularization
  cov_coeff: 100.0              # Covariance decorrelation (high for temporal tasks)
  proj_spec: "256-1024-1024"    # Projector MLP before loss (proportional to dim)

  # Optimizer
  epochs: 60
  lr: 1.0e-3                    # Adam lr (DiffusionNet + EB-JEPA standard)
  weight_decay: 1.0e-5          # Mild L2 (EB-JEPA temporal examples)

  # Logging
  log_wandb: false
  log_every: 1
  save_every: 10                # Checkpoint every 10 epochs

# ---- Evaluation ----
# Runs once per feature_type after training
eval:
  batch_size: 16
  num_workers: 0
  n_inference_clips: 3  # Number of clips to visualize
  max_horizon: 15  # Maximum prediction horizon to evaluate
