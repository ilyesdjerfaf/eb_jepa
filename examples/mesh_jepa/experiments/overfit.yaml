# ============================================================
# Overfit experiment — sanity check
# ============================================================
# Trains on 2 clips only. If the model has enough capacity,
# pred_loss should reach ~0. If it doesn't → architectural bug.
#
# Usage:
#   uv run python -m examples.mesh_jepa.run_experiment \
#       --config examples/mesh_jepa/experiments/overfit.yaml all --preprocess
# ============================================================

experiment:
  name: "overfit_sanity"
  seed: 42
  device: auto
  feature_types: [hks]

preprocessing:
  raw_data_dir: datasets/dfaust/raw
  processed_dir: datasets/dfaust/processed  # Use existing
  #
  # Available actions (DFAUST, 14 total):
  #   chicken_wings, hips, jiggle_on_toes, jumping_jacks, knees,
  #   light_hopping_loose, light_hopping_stiff, one_leg_jump,
  #   one_leg_loose, punching, running_on_spot, shake_arms,
  #   shake_hips, shake_shoulders
  actions: [jumping_jacks, punching, running_on_spot]
  n_eigen: 128
  n_hks: 16
  temporal_stride: 4

training:
  seq_len: 16
  batch_size: 2               # Only 2 clips in the entire dataset
  max_clips: 2                # Limit to exactly 2 clips
  num_workers: 0
  train_subjects: [50002]     # Single subject
  test_subjects: [50026, 50027]

  # Same architecture as default
  width: 256
  depth: 6
  henc: 256
  n_eigen: 128
  dropout: false              # No dropout — we WANT to overfit
  hpre: 256
  predictor_layers: 2
  steps: 4
  grad_clip: 2.0

  # No regularization — let it memorize
  std_coeff: 0.0
  cov_coeff: 0.0
  proj_spec: "256-1024-1024"

  # Many epochs on tiny data
  epochs: 200
  lr: 1.0e-3
  weight_decay: 0.0           # No regularization

  log_wandb: false
  log_every: 1
  save_every: 50

eval:
  batch_size: 2
  num_workers: 0
  n_inference_clips: 2
  max_horizon: 15
